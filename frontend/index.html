<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Dynamic Emoji Favicon -->
    <script>
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🛡️</text></svg>`;
      const link = document.createElement('link');
      link.rel = 'icon';
      link.type = 'image/svg+xml';
      link.href = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
      document.head.appendChild(link);
    </script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Nexus Proctor | Smart Online Examination Platform</title>
  </head>

  <body class="bg-gray-950">
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
